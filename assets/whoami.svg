<svg xmlns="http://www.w3.org/2000/svg" width="800" height="150" viewBox="0 0 800 150">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g transform="translate(400, 40)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    
    <!-- Name -->
    <text x="0" y="0" font-size="32" font-weight="800" fill="#e6edf3" letter-spacing="4">SHAHAB AHMED</text>
    
    <!-- Subtle separator under name -->
    <rect x="-150" y="15" width="300" height="1" fill="url(#glow)">
      <!-- Add a subtle pulsing animation to the line -->
      <animate attributeName="opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
    </rect>
    
    <!-- Title -->
    <text x="0" y="40" font-size="14" font-weight="600" fill="#8b949e" letter-spacing="2">CS STUDENT @ UMT LAHORE 🇵🇰</text>
    
    <!-- Stack -->
    <text x="0" y="75" font-size="13" font-weight="700" fill="#58a6ff" letter-spacing="3">
      C++   •   PYTHON   •   JAVASCRIPT   •   FASTAPI   •   MYSQL
    </text>
    
    <!-- Description -->
    <text x="0" y="105" font-size="13" font-weight="400" fill="#8b949e" font-style="italic" letter-spacing="0.5">
      Building web apps &amp; exploring software automation
    </text>

  </g>
</svg>
