  <text x="20" y="75" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5" font-family="-apple-system, sans-serif">TOTAL STARS</text><text x="420" y="75" text-anchor="end" fill="#e6edf3" font-size="14" font-weight="700" font-family="Consolas, monospace">22</text><line x1="20" y1="87" x2="420" y2="87" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2 4"/><text x="20" y="117" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5" font-family="-apple-system, sans-serif">PUBLIC REPOS</text><text x="420" y="117" text-anchor="end" fill="#e6edf3" font-size="14" font-weight="700" font-family="Consolas, monospace">16</text><line x1="20" y1="129" x2="420" y2="129" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2 4"/><text x="20" y="159" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5" font-family="-apple-system, sans-serif">FOLLOWERS</text><text x="420" y="159" text-anchor="end" fill="#e6edf3" font-size="14" font-weight="700" font-family="Consolas, monospace">3</text><line x1="20" y1="171" x2="420" y2="171" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2 4"/><text x="20" y="201" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5" font-family="-apple-system, sans-serif">CONTRIBUTIONS</text><text x="420" y="201" text-anchor="end" fill="#e6edf3" font-size="14" font-weight="700" font-family="Consolas, monospace">121</text><line x1="20" y1="213" x2="420" y2="213" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2 4"/>
